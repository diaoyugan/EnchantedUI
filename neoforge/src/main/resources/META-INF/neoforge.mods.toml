modLoader = "javafml"
loaderVersion = "${neoforge_loader_version_range}"
license = "${license}"

[[mods]]
modId = "${mod_id}"
version = "${version}"
displayName = "Enchanted UI"
logoFile = "assets/${mod_id}/icon.png"
modType="LIBRARY"

authors = "钓鱼竿呀(diaoyugan), momo(HarukaB, aka AYARI on modrinth)"

description = "A Minecraft GUI API for building modular and composable UI screens."

# ===== 联系信息（fabric 的 contact 对应）=====
displayURL = ""
issueTrackerURL = ""

# ===== Mixin =====
#[[mixins]]
#config = "${mod_id}.mixins.json"
#
#[[mixins]]
#config = "${mod_id}.neoforge.mixins.json"

# ===== 依赖 =====
[[dependencies."${mod_id}"]]
modId = "neoforge"
type = "required"
versionRange = "[${neoforge_version},)"
ordering = "NONE"
side = "CLIENT"

[[dependencies."${mod_id}"]]
modId = "minecraft"
type = "required"
versionRange = "[${minecraft_version},)"
ordering = "NONE"
side = "CLIENT"


# Features are specific properties of the game environment, that you may want to declare you require. This example declares
# that your mod requires GL version 3.2 or higher. Other features will be added. They are side aware so declaring this won't
# stop your mod loading on the server for example.
#[features.${mod_id}]
#openGLVersion="[3.2,)"
